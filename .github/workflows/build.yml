- name: Build App
        run: |
          xcodebuild -project StoreControl.xcodeproj -scheme StoreControl -configuration Release -derivedDataPath build/DerivedDataApp -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO clean build
          mkdir -p build
          cp -r build/DerivedDataApp/Build/Products/Release-iphonesimulator/StoreControl.app ./build/
          cd build
          zip -r StoreControl.ipa StoreControl.app
    runs-on: macos-15-intel
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set Execute Permission for ipabuild.sh
        run: chmod +x ./ipabuild.sh
      - name: Get Latest Commit Message
        id: set-name
        run: |
          commit_message=$(curl -s https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }} | jq -r '.commit.message')
          echo "::set-output name=commit-message::$commit_message"
      - name: Build IPA
        run: ./ipabuild.sh
        env:
          APP_NAME: StoreControl
          BUILD_NUMBER: ${{ github.run_number }}
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StoreControl.ipa
          path: ./build/StoreControl.ipa

